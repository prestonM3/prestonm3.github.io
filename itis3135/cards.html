<!DOCTYPE HTML> 
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>ITIS3135 | Preston Moore | Lazy Lizard | Cards</title>

        <link rel="stylesheet" href="styles/default.css">

        <!-- Accumulus Script -->
        <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
    </head>

    <body>
    <div data-include="components/header.html"></div>

            <main>

                <section id="playing-cards">
                    <h2 class="full-width-heading">Cards</h2>

                    <!-- Ace of Hearts -->
                    <div class="card red-suit">
                        <div class="left">A<br>&hearts;</div>

                        <div class="middle">
                            <img src="images/ace_mouse.png" alt="Mascot" class="card-mascot">
                        </div>

                        <div class="right">A<br>&hearts;</div>
                    </div>

                    <!-- King of Spades -->
                    <div class="card black-suit">
                        <div class="left">K<br>&spades;</div>

                        <div class="middle">
                            <img src="images/king_mouse.png" alt="Mascot" class="card-mascot">
                        </div>

                        <div class="right">K<br>&spades;</div>
                    </div>

                    <!-- Jack of Diamonds -->
                    <div class="card red-suit">
                        <div class="left">J<br>&diams;</div>

                        <div class="middle">
                            <img src="images/joker_mouse.png" alt="Mascot" class="card-mascot">
                        </div>

                        <div class="right">J<br>&diams;</div>
                    </div>

                </section>

            </main>
        <div data-include="components/footer.html"></div>
        <script src="scripts/HTMLInclude.min.js"></script>
    </body>
</html>
